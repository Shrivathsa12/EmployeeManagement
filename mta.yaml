_schema-version: 3.3.0
ID: finaltask
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: finaltask-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: finaltask-auth
      - name: finaltask-db
      - name: finaltask-destination

  - name: finaltask-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: finaltask-db
  - name: finaltask
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: finaltask-auth
      - name: finaltask-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: finaltask-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: finaltaskdepartment
          artifacts:
            - department.zip
          target-path: app/
        - name: finaltaskemployee
          artifacts:
            - employee.zip
          target-path: app/
        - name: finaltaskleaverequest
          artifacts:
            - leave-request.zip
          target-path: app/
        - name: finaltaskmanagerdashboard
          artifacts:
            - manager-dashboard.zip
          target-path: app/
        - name: finaltaskmanagerkpi
          artifacts:
            - manager-kpi.zip
          target-path: app/
        - name: finaltasktravelrequest
          artifacts:
            - travel-request.zip
          target-path: app/
    requires:
      - name: finaltask-auth
      - name: srv-api
      - name: finaltask-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: finaltaskdepartment
    type: html5
    path: app/department
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: finaltaskemployee
    type: html5
    path: app/employee
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: finaltaskleaverequest
    type: html5
    path: app/leave-request
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: finaltaskmanagerdashboard
    type: html5
    path: app/manager-dashboard
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: finaltaskmanagerkpi
    type: html5
    path: app/manager-kpi
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: finaltasktravelrequest
    type: html5
    path: app/travel-request
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: finaltask-destinations
    type: com.sap.application.content
    requires:
      - name: finaltask-auth
        parameters:
          service-key:
            name: finaltask-auth-key
      - name: finaltask-html5-repo-host
        parameters:
          service-key:
            name: finaltask-html5-repo-host-key
      - name: srv-api
      - name: finaltask-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: finaltask-html5-repository
              ServiceInstanceName: finaltask-html5-repo-host
              ServiceKeyName: finaltask-html5-repo-host-key
              sap.cloud.service: finaltask.service
            - Name: finaltask-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: finaltask-auth
              ServiceKeyName: finaltask-auth-key
              sap.cloud.service: finaltask.service

resources:
  - name: finaltask-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: finaltask-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Employee (finaltask ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Employee'
          - name: 'Manager (finaltask ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Manager'
          - name: 'Administrator (finaltask ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Administrator'
    requires:
      - name: app-api
  - name: finaltask-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: finaltask-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
    requires:
      - name: srv-api

  - name: finaltask-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: finaltask-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
